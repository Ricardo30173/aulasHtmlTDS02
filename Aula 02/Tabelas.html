<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas em Html</title>
  </head>
  <body>
    <table border="1">
      <!-- Atributo border para adicionar borda à tabela -->
      <caption>
        <!-- Legenda da tabela -->

        Tabela de informações pessoais
      </caption>
      <!-- Tabela de dados -->
      <thead>
        <!-- Cabeçalho da tabela -->
        <tr>
          <!-- Linha do cabeçalho -->

          <th>Nome</th>
          <!-- Coluna 01 -->
          <th>Idade</th>
          <!-- Coluna 02 -->
          <th>Cidade</th>
          <!-- Coluna 03 -->
        </tr>
      </thead>
      <tbody>
        <!-- Corpo da tabela -->
        <tr>
          <td>Luis</td>
          <!-- Coluna 01 -->
          <td>18</td>
          <!-- Coluna 02 -->
          <td>São Paulo</td>
          <!-- Coluna 03 -->
        </tr>
        <tr>
          <td>Maria</td>
          <!-- Coluna 01 -->
          <td>25</td>
          <!-- Coluna 02 -->
          <td>Rio de Janeiro</td>
          <!-- Coluna 03 -->
        </tr>
        <tr>
          <td>João</td>
          <!-- Coluna 01 -->
          <td>30</td>
          <!-- Coluna 02 -->
          <td>Belo Horizonte</td>
          <!-- Coluna 03 -->
        </tr>
        <tr>
          <td>Rodrigo</td>
          <!-- Coluna 01 -->
          <td>27</td>
          <!-- Coluna 02 -->
          <td>Brasília</td>
          <!-- Coluna 03 -->
        </tr>
      </tbody>

      <!-- Rodapé da tabela -->
      <tr>
        <td colspan="3">Total de pessoas: 4</td>
        <!-- Colspan para mesclar as colunas -->
      </tr>
    </table>
  </body>
</html>
