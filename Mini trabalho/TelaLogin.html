<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .social-buttons {
  display: flex;
  gap: 10px; /* espaço entre os botões */
  justify-content: center; /* centraliza (opcional) */
}

.google-btn {
  font-size: 16px;
  padding: 10px 20px;
  background-color: #db4437;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.facebook-btn {
  font-size: 16px;
  padding: 10px 20px;
  background-color: #4267b2;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
    </style>
  </head>
  <body style="text-align: center">
    <h1>Login</h1>
    <form name="telaLogin" action="/Login" method="post"></form>

    <label for="email"><strong>Email:</strong></label>
    <input
      required
      maxlength="180"
      type="email"
      id="email"
      placeholder="Digite seu email"
    />

    <br />
    <br />

    <label maxlength="180" for="senha"><strong>Senha:</strong></label>
    <input required type="password" id="senha" placeholder="Digite sua senha" />

    <br />
    <a href="esqueciMinhaSenha.html" style="font-size: medium;
     padding: 100px; text-decoration: none;" 
      >Esqueci minha senha</a
    >
    <br />
    <br />
    <input
      type="button"
      value="Cadastrar"
      onclick="alert('Cadastrado com sucesso!')"
      style="
        font-size: 16px;
        padding: 10px 20px;
        background-color: #17c71d;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      "
    />

    <br />
    <br />
    <div class="social-buttons">
      <input class="google-btn"
        type="button"
        value="Google"

    />
    <br />
    <input class="facebook-btn"
      type="button"
      value="Facebook"
 
    />
  </body>
</html>
