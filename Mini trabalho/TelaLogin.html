<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela de Login</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(
          90deg,
          #2a7b9b 0%,
          #57c785 50%,
          #eddd53 100%
        );
      }

      .border-content {
        width: 100%;
        max-width: 400px;
        margin: auto;
        padding: 2rem;
        background-color: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
        color: #333333;
        margin-bottom: 2rem;
        padding: 0.5rem;
        background-color: #e0f7fa;
        border-radius: 8px;
      }

      input[type="email"],
      input[type="password"] {
        width: calc(100% - 20px);
        padding: 10px;
        margin-bottom: 1rem;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 1rem;
        transition: border-color 0.3s;
      }

      input[type="email"]:focus,
      input[type="password"]:focus {
        border-color: #17c71d;
        outline: none;
      }

      input[type="button"] {
        width: 100%;
        padding: 12px;
        font-size: 1rem;
        background-color: #17c71d;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.3s;
        margin-top: 1rem;
        margin-bottom: 2rem;
      }

      input[type="button"]:hover {
        background-color: #bce78b;
      }

      .social-buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 1rem;
      }

      input.google-btn {
        background-color: #db4437 !important;
        color: white;
        border: none;
        border-radius: 5px;
        padding: 10px 20px;
        cursor: pointer;
        transition: opacity 0.3s;
      }

      input.facebook-btn {
        background-color: #4267b2 !important;
        color: white;
        border: none;
        border-radius: 5px;
        padding: 10px 20px;
        cursor: pointer;
        transition: opacity 0.3s;
      }

      .social-buttons input:hover {
        opacity: 0.8;
      }

      .signup-link {
        text-align: right;
        font-size: 0.9rem;
      }

      .signup-link a {
        text-decoration: none;
        color: #333333;
        transition: color 0.3s;
      }

      .signup-link a:hover {
        color: #17c71d;
      }
    </style>
  </head>
  <body style="text-align: center">
    <div class="border-content">
      <h1>Login</h1>
      <form name="telaLogin" action="/Login" method="post">
        <label for="email"><strong>Email:</strong></label>
        <input
          required
          maxlength="100"
          type="email"
          id="email"
          placeholder="Digite seu email"
        />

        <label maxlength="100" for="senha"><strong>Senha:</strong></label>
        <input
          required
          type="password"
          id="senha"
          placeholder="Digite sua senha"
        />

        <input
          type="button"
          value="Entrar"
          onclick="alert('Logado com sucesso!')"
        />

        <div class="social-buttons">
          <input class="google-btn" type="button" value="Google" />
          <input class="facebook-btn" type="button" value="Facebook" />
          <input
            type="button"
            value="Microsoft"
            style="
              font-size: 12px;
              padding: 10px 20px;
              background-color: #2f2f2f;
              color: white;
              border: none;
              border-radius: 5px;
              cursor: pointer;
              transition: opacity 0.3s;
            "
            onmouseover="this.style.opacity = 0.8"
            onmouseout="this.style.opacity = 1"
          />
        </div>

        <div class="signup-link">
          <a href="Cadastro.html">Cadastrar-se</a>
        </div>
      </form>
    </div>
  </body>
</html>
